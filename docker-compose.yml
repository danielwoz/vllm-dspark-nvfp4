# DeepSeek-V4-Flash-Abliterated-DSpark with the true 4-bit NVFP4 KV cache
# (vLLM DSpark fork + flashinfer SM120 patches baked into the image).
#
# Requires: 2x SM120 GPUs (e.g. RTX PRO 6000 Blackwell), NVIDIA container toolkit.
#
# Profile: 1M context window with CUDA graphs (FULL_AND_PIECEWISE, capture 8).
# Measured on 2x RTX PRO 6000: ~1.63M-token KV pool (1.55x concurrent 1M sessions),
# single-stream ITL ~14.5 ms median, TTFT ~0.5 s.
#   - capture 64 starves KV below the 1M minimum (profiler reserves ~17 GiB/GPU);
#     capture 8 keeps one speculative-decode session on the FULL-graph fast path.
#   - eager fallback (slower decode, bigger pool): remove the compilation-config
#     and max-cudagraph-capture-size lines and add --enforce-eager.
#
# Configuration (env vars, all optional):
#   NVFP4_GPUS       GPUs to use: "all", indices ("0,1"), or UUIDs. Default: all.
#                    Use UUIDs on mixed-GPU hosts so a non-SM120 card is never picked
#                    (find them with `nvidia-smi -L`).
#   NVFP4_TP         tensor-parallel size. Default: 2.
#   NVFP4_PORT       host port. Default: 8008.
#   HF_CACHE_DIR     HuggingFace cache holding the model. Default: ~/.cache/huggingface
#   JIT_CACHE_DIR    persistent Triton/FlashInfer compile cache (local disk
#                    recommended; avoids first-request compile stalls). Default: ./jit-cache
#
# Start:  docker compose up -d      Logs:  docker compose logs -f
# First start downloads ~155 GB of weights unless already in HF_CACHE_DIR
# (set HF_HUB_OFFLINE=1 in `environment` once cached to skip network checks).
services:
  deepseek-v4-nvfp4:
    image: danielwoz/vllm:dspark-nvfp4-cu132-20260708
    container_name: deepseek-v4-nvfp4
    restart: unless-stopped
    runtime: nvidia
    ipc: host                       # required for vLLM tensor-parallel shared memory
    ports:
      - "${NVFP4_PORT:-8008}:8000"
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/hf
      - ${JIT_CACHE_DIR:-./jit-cache}:/cache/jit
    environment:
      HF_HOME: "/hf"
      NVIDIA_VISIBLE_DEVICES: "${NVFP4_GPUS:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      CUDA_DEVICE_ORDER: "PCI_BUS_ID"
    entrypoint: ["/opt/venv/bin/python3"]
    command:
      - "-m"
      - "vllm.entrypoints.cli.main"
      - "serve"
      - "fraserprice/DeepSeek-V4-Flash-Abliterated-DSpark"
      # "[1m]" suffix -> Claude Code sizes its context window / auto-compact for 1M
      - "--served-model-name"
      - "deepseekv4-flash[1m]"
      - "deepseekv4-flash"
      - "DeepSeek-V4-Flash-Abliterated-DSpark"
      - "--tensor-parallel-size=${NVFP4_TP:-2}"
      - "--gpu-memory-utilization=0.95"
      - "--max-model-len=1048576"
      - "--max-cudagraph-capture-size=8"
      - "--compilation-config={\"cudagraph_mode\":\"FULL_AND_PIECEWISE\",\"custom_ops\":[\"all\"]}"
      - "--trust-remote-code"
      - "--tokenizer-mode=deepseek_v4"
      - "--kv-cache-dtype=nvfp4_ds_mla"
      - "--block-size=256"
      - "--speculative-config={\"method\":\"dspark\",\"num_speculative_tokens\":4,\"draft_sample_method\":\"probabilistic\"}"
      - "--max-num-seqs=32"
      - "--max-num-batched-tokens=2048"
      - "--attention-backend=FLASHINFER_MLA_SPARSE_DSV4"
      - "--kernel-config.moe_backend=marlin"
      - "--disable-custom-all-reduce"
      - "--async-scheduling"
      - "--enable-chunked-prefill"
      - "--enable-prefix-caching"
      # Thinking on by default (needed for clients that can't send
      # chat_template_kwargs, e.g. Claude Code via the Anthropic endpoint). Remove
      # this line for chat-mode default; per-request kwargs always override.
      # Note: adding "reasoning_effort": "max" measured WORSE for agentic coding
      # (burns agent step budget on trivial tool calls) — reserve max for
      # single-shot hard reasoning.
      - "--default-chat-template-kwargs={\"thinking\": true}"
      - "--reasoning-parser=deepseek_v4"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=deepseek_v4"
      - "--host=0.0.0.0"
      - "--port=8000"
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 40
      start_period: 1800s           # cold model load / first download can take a while
