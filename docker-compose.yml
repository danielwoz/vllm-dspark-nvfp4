# DeepSeek-V4-Flash-Abliterated-DSpark with the true 4-bit NVFP4 KV cache,
# served by the dspark-vllm fork build (nvfp4 overlay baked into the image),
# pinned to the two RTX PRO 6000 Blackwell cards (SM120).
#
# Profile: 1M context window with CUDA graphs (FULL_AND_PIECEWISE, capture 8).
#   - util 0.95 / capture 8: ~1.63M-token KV pool, 1.55x concurrent 1M sessions,
#     single-stream decode ~160 tok/s on random tokens (~220+ on real code).
#   - capture 64 starves KV below the 1M minimum (estimator reserves ~17 GiB/GPU);
#     capture 8 covers one spec-decode session on the FULL-graph fast path.
#   - eager fallback (slow decode, 2.41M pool): drop the compilation-config and
#     max-cudagraph-capture-size lines and add --enforce-eager.
#   - previous fp8/jasl-fork setup preserved in docker-compose.fp8-jasl.yml.bak.
#
# Start:  docker compose up -d
# Logs:   docker compose logs -f
services:
  deepseek-v4-nvfp4:
    image: danielwoz/vllm:dspark-nvfp4-cu132-20260708
    container_name: deepseek-v4-nvfp4
    restart: unless-stopped
    ipc: host                       # required for vLLM tensor-parallel shared memory
    ports:
      - "8008:8000"   # host 8008 -> container 8000 (host :8012 forwards here too)
    volumes:
      # HF cache that already holds the downloaded weights (HF_HOME on the host)
      - /mnt/cephfs/ai/huggingface:/hf
      # Persistent JIT cache (Triton/FlashInfer/vLLM compile artifacts) so container
      # recreates skip first-request compile stalls. Local disk, not CephFS.
      - /home/danielwoz/dspark-nvfp4-port/jit-cache:/cache/jit
    environment:
      HF_HOME: "/hf"
      HF_HUB_OFFLINE: "1"           # weights are local; don't hit the network on start
    deploy:
      resources:
        reservations:
          devices:
            # ONLY the two PRO 6000 (SM120), by UUID so the 3090 is never picked
            - driver: nvidia
              device_ids:
                - "GPU-adcef861-9a92-ca06-d7d8-0db8bb038d2b"
                - "GPU-c2377861-8cae-e23c-2283-bf39f30975aa"
              capabilities: [gpu]
    entrypoint: ["/opt/venv/bin/python3"]
    command:
      - "-m"
      - "vllm.entrypoints.cli.main"
      - "serve"
      - "fraserprice/DeepSeek-V4-Flash-Abliterated-DSpark"
      # "[1m]" suffix -> Claude Code sizes its context window / auto-compact for 1M
      - "--served-model-name"
      - "deepseekv4-flash[1m]"
      - "deepseekv4-flash"
      - "DeepSeek-V4-Flash-Abliterated-DSpark"
      - "--tensor-parallel-size=2"
      - "--gpu-memory-utilization=0.95"
      - "--max-model-len=1048576"
      - "--max-cudagraph-capture-size=8"
      - "--compilation-config={\"cudagraph_mode\":\"FULL_AND_PIECEWISE\",\"custom_ops\":[\"all\"]}"
      - "--trust-remote-code"
      - "--tokenizer-mode=deepseek_v4"
      - "--kv-cache-dtype=nvfp4_ds_mla"
      - "--block-size=256"
      - "--speculative-config={\"method\":\"dspark\",\"num_speculative_tokens\":4,\"draft_sample_method\":\"probabilistic\"}"
      - "--max-num-seqs=32"
      - "--max-num-batched-tokens=2048"
      - "--attention-backend=FLASHINFER_MLA_SPARSE_DSV4"
      - "--kernel-config.moe_backend=marlin"
      - "--disable-custom-all-reduce"
      - "--async-scheduling"
      - "--enable-chunked-prefill"
      - "--enable-prefix-caching"
      - "--reasoning-parser=deepseek_v4"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=deepseek_v4"
      - "--host=0.0.0.0"
      - "--port=8000"
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 40
      start_period: 1800s           # cold model load over CephFS can take a while
